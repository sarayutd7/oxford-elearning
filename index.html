<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Oxford 3000</title>
<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:linear-gradient(135deg,#f5f1eb,#ece6de);
color:#222;
}
header{
padding:24px;
text-align:center;
backdrop-filter:blur(14px);
background:rgba(255,255,255,.4);
position:sticky;
top:0;
}
.tabs{
display:flex;
gap:10px;
padding:16px;
overflow:auto;
}
.tab-btn{
border:none;
padding:12px 18px;
border-radius:999px;
background:rgba(255,255,255,.55);
cursor:pointer;
}
.active-btn{
background:#d99a6c;
color:white;
}
.container{
max-width:1000px;
margin:auto;
padding:20px;
}
.card{
background:rgba(255,255,255,.55);
backdrop-filter:blur(18px);
padding:24px;
border-radius:28px;
margin-bottom:20px;
}
.tab{
display:none;
}
.active{
display:block;
}
input{
width:100%;
padding:16px;
border:none;
border-radius:16px;
font-size:16px;
}
.word-card{
padding:14px;
margin-top:10px;
border-radius:18px;
background:rgba(255,255,255,.6);
}
.flashcard{
min-height:260px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
font-size:24px;
}
.big{
font-size:48px;
font-weight:700;
}
button{
border:none;
padding:12px 18px;
border-radius:16px;
background:#d99a6c;
color:white;
cursor:pointer;
margin:6px;
}
.quiz-option{
display:block;
width:100%;
margin-top:10px;
}
</style>
</head>
<body>

<header>
<h1>Oxford 3000 E‑Learning</h1>
<p>2 Files Version • Clean Blur UI</p>
</header>

<div class="tabs">
<button class="tab-btn active-btn" onclick="openTab(event,'search')">🔍 Search</button>
<button class="tab-btn" onclick="openTab(event,'words')">📚 Words</button>
<button class="tab-btn" onclick="openTab(event,'flash')">🃏 Flashcard</button>
<button class="tab-btn" onclick="openTab(event,'quiz')">📝 Quiz</button>
</div>

<div class="container">

<div id="search" class="tab active">
<div class="card">
<input id="searchInput" placeholder="ค้นหาคำศัพท์..." onkeyup="searchWord()">
<div id="searchResult"></div>
</div>
</div>

<div id="words" class="tab">
<div class="card">
<div id="allWords"></div>
</div>
</div>

<div id="flash" class="tab">
<div class="card">
<div id="flashcard" class="flashcard">Loading...</div>
<div>
<button onclick="prevCard()">◀ Prev</button>
<button onclick="nextCard()">Next ▶</button>
<button onclick="speak()">🔊 Speak</button>
</div>
</div>
</div>

<div id="quiz" class="tab">
<div class="card">
<h2>Quiz</h2>
<p id="quizQuestion"></p>
<div id="quizOptions"></div>
<div id="quizResult"></div>
<button onclick="newQuiz()">สุ่มใหม่</button>
</div>
</div>

</div>

<script>
let vocab=[];
let current=0;
let currentQuiz=null;

fetch('vocab.json')
.then(r=>r.json())
.then(data=>{
vocab=data;
showCard();
renderWords();
newQuiz();
});

function openTab(e,id){
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active-btn'));
document.getElementById(id).classList.add('active');
e.target.classList.add('active-btn');
}

function showCard(){
let v=vocab[current];
document.getElementById('flashcard').innerHTML=`
<div class="big">${v.word}</div>
<div>${v.meaning_th}</div>
<div>${v.pronounce_th}</div>
<small>${v.ipa}</small>
`;
}

function nextCard(){
current=(current+1)%vocab.length;
showCard();
}

function prevCard(){
current=(current-1+vocab.length)%vocab.length;
showCard();
}

function speak(){
speechSynthesis.cancel();
const u=new SpeechSynthesisUtterance(vocab[current].word);
u.lang='en-US';
u.rate=.9;
speechSynthesis.speak(u);
}

function searchWord(){
let q=document.getElementById('searchInput').value.toLowerCase();
let found=vocab.filter(v=>
v.word.toLowerCase().includes(q)||
(v.meaning_th||'').includes(q)
).slice(0,50);

document.getElementById('searchResult').innerHTML=
found.map(v=>`
<div class="word-card">
<b>${v.word}</b><br>
${v.meaning_th}<br>
${v.pronounce_th}<br>
<small>${v.ipa}</small>
</div>
`).join('');
}

function renderWords(){
document.getElementById('allWords').innerHTML=
vocab.map(v=>`
<div class="word-card">
<b>${v.word}</b> — ${v.meaning_th}<br>
<small>${v.pronounce_th}</small>
</div>
`).join('');
}

function shuffle(a){
return a.sort(()=>Math.random()-0.5);
}

function newQuiz(){
const q=vocab[Math.floor(Math.random()*vocab.length)];
currentQuiz=q;

let options=[q.meaning_th];

while(options.length<4){
const c=vocab[Math.floor(Math.random()*vocab.length)].meaning_th;
if(!options.includes(c)) options.push(c);
}

options=shuffle(options);

document.getElementById('quizQuestion').innerHTML=
`คำว่า <b>${q.word}</b> แปลว่าอะไร?`;

document.getElementById('quizOptions').innerHTML=
options.map(o=>`
<button class="quiz-option" onclick="checkAnswer('${o}')">${o}</button>
`).join('');

document.getElementById('quizResult').innerHTML='';
}

function checkAnswer(ans){
let r=document.getElementById('quizResult');

if(ans===currentQuiz.meaning_th){
r.innerHTML='✅ Correct';
r.style.color='green';
}else{
r.innerHTML='❌ Correct: '+currentQuiz.meaning_th;
r.style.color='red';
}
}
</script>

</body>
</html>
