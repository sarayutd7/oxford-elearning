<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oxford 3000 E-Learning</title>

<style>

body{
  font-family:Arial,sans-serif;
  margin:0;
  background:#f7f2ed;
  color:#333;
}

header{
  background:#d98c5f;
  color:white;
  padding:20px;
  text-align:center;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

.card{
  background:white;
  border-radius:16px;
  padding:20px;
  margin-bottom:20px;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.flashcard{
  background:#fff4ec;
  border-radius:16px;
  padding:50px;
  text-align:center;
  font-size:34px;
  cursor:pointer;
  min-height:150px;
}

button{
  padding:12px 18px;
  border:none;
  border-radius:10px;
  background:#d98c5f;
  color:white;
  margin:6px;
  font-size:16px;
  cursor:pointer;
}

small{
  color:#666;
}

input{
  width:100%;
  padding:14px;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:16px;
}

.result{
  margin-top:10px;
  font-weight:bold;
}

.search-item{
  margin:10px 0;
}

</style>

</head>

<body>

<header>
<h1>Oxford 3000 E-Learning</h1>
<p>Flashcard + Quiz + Speak</p>
</header>

<div class="container">

<div class="card">

<h2>🔍 Search Vocabulary</h2>

<input
 type="text"
 id="search"
 placeholder="Search vocabulary..."
 onkeyup="searchWord()"
>

<div id="searchResult"></div>

</div>

<div class="card">

<h2>🃏 Flashcard</h2>

<div
 id="flashcard"
 class="flashcard"
 onclick="flipCard()"
>
Loading...
</div>

<div>

<button onclick="prevCard()">
◀ Previous
</button>

<button onclick="nextCard()">
Next ▶
</button>

<button onclick="speakCurrentWord()">
🔊 Speak
</button>

</div>

</div>

<div class="card">

<h2>📝 Quiz</h2>

<p id="quizQuestion"></p>

<div id="quizOptions"></div>

<div class="result" id="quizResult"></div>

<button onclick="newQuiz()">
สุ่มคำถามใหม่
</button>

</div>

</div>

<script>

let vocab=[];
let current=0;
let flipped=false;
let currentQuiz=null;

fetch('vocab.json')
.then(r=>r.json())
.then(data=>{

  vocab=data;

  showCard();

  newQuiz();

});

function showCard(){

 const card=document.getElementById('flashcard');

 const item=vocab[current];

 flipped=false;

 card.innerHTML=   <div>${item.word}</div>    <small>${item.ipa}</small> ;

}

function flipCard(){

 const card=document.getElementById('flashcard');

 const item=vocab[current];

 if(!flipped){

   card.innerHTML=`
     <div>${item.meaning}</div>
     <small>${item.word}</small>
   `;

   flipped=true;

 } else {

   showCard();

 }

}

function nextCard(){

 current=(current+1)%vocab.length;

 showCard();

}

function prevCard(){

 current=(current-1+vocab.length)%vocab.length;

 showCard();

}

function speak(word){

 const utterance =
   new SpeechSynthesisUtterance(word);

 utterance.lang='en-US';

 utterance.rate=0.9;

 utterance.pitch=1;

 speechSynthesis.cancel();

 speechSynthesis.speak(utterance);

}

function speakCurrentWord(){

 speak(vocab[current].word);

}

function searchWord(){

 const q=document
   .getElementById('search')
   .value
   .toLowerCase();

 const result=document
   .getElementById('searchResult');

 if(q===''){

   result.innerHTML='';

   return;

 }

 const found=vocab
   .filter(v=>
      v.word.toLowerCase().includes(q)
   )
   .slice(0,20);

 result.innerHTML=found.map(v=>`

   <div class="search-item">

     <strong>${v.word}</strong>
     = ${v.meaning}

     <small>${v.ipa}</small>

     <button onclick="speak('${v.word}')">
       🔊
     </button>

   </div>

 `).join('');

}

function shuffle(arr){

 return arr.sort(()=>Math.random()-0.5);

}

function newQuiz(){

 const q=vocab[
   Math.floor(Math.random()*vocab.length)
 ];

 currentQuiz=q;

 let options=[q.meaning];

 while(options.length<4){

   const candidate=vocab[
     Math.floor(Math.random()*vocab.length)
   ].meaning;

   if(!options.includes(candidate))
      options.push(candidate);

 }

 options=shuffle(options);

 document.getElementById(
   'quizQuestion'
 ).innerHTML=
 `คำว่า "<strong>${q.word}</strong>" แปลว่าอะไร?`;

 document.getElementById(
   'quizOptions'
 ).innerHTML=
 options.map(opt=>`

   <button onclick="checkAnswer('${opt}')">
     ${opt}
   </button>

 `).join('');

 document.getElementById(
   'quizResult'
 ).innerHTML='';

}

function checkAnswer(answer){

 const result=document
   .getElementById('quizResult');

 if(answer===currentQuiz.meaning){

   result.innerHTML='✅ Correct';

   result.style.color='green';

 } else {

   result.innerHTML=
   `❌ Correct answer:
    ${currentQuiz.meaning}`;

   result.style.color='red';

 }

}

</script>

</body>
</htm>
