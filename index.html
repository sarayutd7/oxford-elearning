
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Oxford 3000</title>
<style>
body{font-family:Arial;background:#f7f2ed;padding:20px}
.card{background:white;padding:20px;border-radius:16px;margin-bottom:20px}
.flash{background:#fff4ec;padding:40px;border-radius:16px;text-align:center;font-size:34px}
button{padding:10px 16px;border:none;border-radius:10px;background:#d98c5f;color:white;margin:5px}
input{width:100%;padding:14px}
</style>
</head>
<body>

<div class="card">
<h1>Oxford 3000 E‑Learning</h1>
<p>Total words loaded dynamically</p>
</div>

<div class="card">
<input id="search" placeholder="Search..." onkeyup="searchWord()">
<div id="searchResult"></div>
</div>

<div class="card">
<div id="flashcard" class="flash">Loading...</div>
<button onclick="prevCard()">Prev</button>
<button onclick="nextCard()">Next</button>
<button onclick="speak()">🔊 Speak</button>
</div>

<script>

let vocab=[];
let current=0;

fetch('vocab.json')
.then(r=>r.json())
.then(data=>{
 vocab=data;
 showCard();
});

function showCard(){

 let item=vocab[current];

 document.getElementById('flashcard').innerHTML=`
   <div>${item.word}</div>
   <div style="font-size:24px">${item.meaning_th}</div>
   <small>${item.pronounce_th}</small>
   <br>
   <small>${item.ipa}</small>
 `;
}

function nextCard(){
 current=(current+1)%vocab.length;
 showCard();
}

function prevCard(){
 current=(current-1+vocab.length)%vocab.length;
 showCard();
}

function speak(){
 speechSynthesis.cancel();
 let u=new SpeechSynthesisUtterance(vocab[current].word);
 u.lang='en-US';
 speechSynthesis.speak(u);
}

function searchWord(){

 let q=document.getElementById('search').value.toLowerCase();

 let found=vocab.filter(v=>
   v.word.toLowerCase().includes(q)
 ).slice(0,20);

 document.getElementById('searchResult').innerHTML=
 found.map(v=>`
   <p>
   <b>${v.word}</b> =
   ${v.meaning_th}
   </p>
 `).join('');
}

</script>
</body>
</html>
