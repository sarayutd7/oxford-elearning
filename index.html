<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vocab Manager</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f4f6f9;
      padding: 20px;
    }

    .container {
      max-width: 1000px;
      margin: auto;
    }

    h1 {
      margin-bottom: 20px;
      color: #222;
    }

    .top-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    input {
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 10px;
      flex: 1;
      min-width: 150px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 12px 16px;
      cursor: pointer;
      font-weight: bold;
    }

    .add-btn {
      background: #2ecc71;
      color: white;
    }

    .save-btn {
      background: #3498db;
      color: white;
    }

    .vocab-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    .vocab-card {
      background: white;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    .word {
      font-size: 22px;
      font-weight: bold;
      color: #222;
      margin-bottom: 8px;
    }

    .meaning {
      color: #444;
      margin-bottom: 6px;
    }

    .pronounce,
    .ipa,
    .pos {
      color: #666;
      font-size: 14px;
      margin-bottom: 4px;
    }

    .vocab-actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }

    .edit-btn {
      flex: 1;
      background: #3498db;
      color: white;
    }

    .delete-btn {
      flex: 1;
      background: #e74c3c;
      color: white;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: none;
      justify-content: center;
      align-items: center;
      padding: 20px;
      z-index: 999;
    }

    .modal-content {
      background: white;
      width: 100%;
      max-width: 500px;
      border-radius: 20px;
      padding: 20px;
    }

    .modal-content h2 {
      margin-bottom: 16px;
    }

    .modal-content .form-group {
      margin-bottom: 12px;
    }

    .modal-content input {
      width: 100%;
    }

    .modal-buttons {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .cancel-btn {
      background: #999;
      color: white;
      flex: 1;
    }

    .update-btn {
      background: #2ecc71;
      color: white;
      flex: 1;
    }

    @media (max-width: 600px) {
      .top-bar {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>📚 Vocab Manager</h1>

    <div class="top-bar">
      <input type="text" id="wordInput" placeholder="Word" />
      <input type="text" id="meaningInput" placeholder="Meaning TH" />
      <input type="text" id="pronounceInput" placeholder="Pronounce TH" />
      <input type="text" id="ipaInput" placeholder="IPA" />
      <input type="text" id="posInput" placeholder="Part of Speech" />

      <button class="add-btn" onclick="addVocab()">Add</button>
      <button class="save-btn" onclick="downloadJSON()">Export JSON</button>
    </div>

    <div class="vocab-list" id="vocabList"></div>
  </div>

  <div class="modal" id="editModal">
    <div class="modal-content">
      <h2>Edit Vocabulary</h2>

      <div class="form-group">
        <input type="text" id="editWord" placeholder="Word">
      </div>

      <div class="form-group">
        <input type="text" id="editMeaning" placeholder="Meaning">
      </div>

      <div class="form-group">
        <input type="text" id="editPronounce" placeholder="Pronounce TH">
      </div>

      <div class="form-group">
        <input type="text" id="editIPA" placeholder="IPA">
      </div>

      <div class="form-group">
        <input type="text" id="editPOS" placeholder="Part of Speech">
      </div>

      <div class="modal-buttons">
        <button class="cancel-btn" onclick="closeModal()">Cancel</button>
        <button class="update-btn" onclick="updateVocab()">Save</button>
      </div>
    </div>
  </div>

  <script>
    let vocabData = JSON.parse(localStorage.getItem('vocabData')) || [];

    let currentEditIndex = null;

    function renderVocab() {
      const vocabList = document.getElementById('vocabList');
      vocabList.innerHTML = '';

      vocabData.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = 'vocab-card';

        card.innerHTML = `
          <div class="word">${item.word || ''}</div>
          <div class="meaning">${item.meaning_th || ''}</div>
          <div class="pronounce">🗣 ${item.pronounce_th || ''}</div>
          <div class="ipa">/${item.ipa || ''}/</div>
          <div class="pos">📘 ${item.part_of_speech || '-'}</div>

          <div class="vocab-actions">
            <button class="edit-btn" onclick="openEdit(${index})">Edit</button>
            <button class="delete-btn" onclick="deleteVocab(${index})">Delete</button>
          </div>
        `;

        vocabList.appendChild(card);
      });

      localStorage.setItem('vocabData', JSON.stringify(vocabData));
    }

    function addVocab() {
      const word = document.getElementById('wordInput').value.trim();
      const meaning = document.getElementById('meaningInput').value.trim();
      const pronounce = document.getElementById('pronounceInput').value.trim();
      const ipa = document.getElementById('ipaInput').value.trim();
      const pos = document.getElementById('posInput').value.trim();

      if (!word) {
        alert('Please enter a word');
        return;
      }

      vocabData.push({
        word,
        meaning_th: meaning,
        pronounce_th: pronounce,
        ipa,
        part_of_speech: pos
      });

      document.getElementById('wordInput').value = '';
      document.getElementById('meaningInput').value = '';
      document.getElementById('pronounceInput').value = '';
      document.getElementById('ipaInput').value = '';
      document.getElementById('posInput').value = '';

      renderVocab();
    }

    function deleteVocab(index) {
      const confirmDelete = confirm('Delete this vocabulary?');

      if (!confirmDelete) return;

      vocabData.splice(index, 1);
      renderVocab();
    }

    function openEdit(index) {
      currentEditIndex = index;

      const item = vocabData[index];

      document.getElementById('editWord').value = item.word || '';
      document.getElementById('editMeaning').value = item.meaning_th || '';
      document.getElementById('editPronounce').value = item.pronounce_th || '';
      document.getElementById('editIPA').value = item.ipa || '';
      document.getElementById('editPOS').value = item.part_of_speech || '';

      document.getElementById('editModal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('editModal').style.display = 'none';
    }

    function updateVocab() {
      if (currentEditIndex === null) return;

      vocabData[currentEditIndex] = {
        word: document.getElementById('editWord').value,
        meaning_th: document.getElementById('editMeaning').value,
        pronounce_th: document.getElementById('editPronounce').value,
        ipa: document.getElementById('editIPA').value,
        part_of_speech: document.getElementById('editPOS').value
      };

      renderVocab();
      closeModal();
    }

    function downloadJSON() {
      const blob = new Blob([
        JSON.stringify(vocabData, null, 2)
      ], {
        type: 'application/json'
      });

      const url = URL.createObjectURL(blob);

      const a = document.createElement('a');
      a.href = url;
      a.download = 'vocab_3000.json';
      a.click();

      URL.revokeObjectURL(url);
    }

    renderVocab();
  </script>

</body>
</html>
