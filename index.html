<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Oxford 3000 Ultra Fast
</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:linear-gradient(
135deg,
#dbeafe,
#eff6ff
);
color:#111827;
}

header{
padding:24px;
text-align:center;
background:rgba(255,255,255,.55);
backdrop-filter:blur(18px);
position:sticky;
top:0;
z-index:999;
}

.tabs{
display:flex;
gap:10px;
padding:16px;
overflow:auto;
}

.tab-btn{
border:none;
background:black;
color:white;
padding:12px 16px;
border-radius:14px;
cursor:pointer;
white-space:nowrap;
flex-shrink:0;
}

.active-btn{
background:#111827;
}

.container{
max-width:1000px;
margin:auto;
padding:16px;
}

.card{
background:rgba(255,255,255,.55);
backdrop-filter:blur(18px);
padding:20px;
border-radius:24px;
margin-bottom:20px;
}

.tab{
display:none;
}

.active{
display:block;
}

input{
width:100%;
padding:14px;
border:none;
border-radius:14px;
font-size:16px;
}

.word-item{
padding:14px;
margin-top:10px;
border-radius:14px;
background:rgba(255,255,255,.7);
}

button{
border:none;
background:black;
color:white;
padding:10px 14px;
border-radius:12px;
cursor:pointer;
margin:4px;
}

.flashcard{
min-height:260px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.big{
font-size:44px;
font-weight:700;
word-break:break-word;
}

.pagination{
margin-top:20px;
display:flex;
flex-wrap:wrap;
gap:6px;
}

.edit-box{
display:none;
margin-top:12px;
padding:14px;
border-radius:14px;
background:white;
}

small{
opacity:.7;
}

</style>

</head>

<body>

<header>

<h1>
Oxford 3000
</h1>

<p>
Ultra Fast Version
</p>

</header>

<div class="tabs">

<button
class="tab-btn active-btn"
onclick="openTab(event,'search')">
🔍 Search
</button>

<button
class="tab-btn"
onclick="openTab(event,'all')">
📚 All Words
</button>

<button
class="tab-btn"
onclick="openTab(event,'flash')">
🃏 Flashcard
</button>

<button
class="tab-btn"
onclick="openTab(event,'quiz')">
📝 Quiz
</button>

<button
class="tab-btn"
onclick="openTab(event,'manage')">
⚙ Manage
</button>

</div>

<div class="container">

<!-- SEARCH -->

<div id="search"
class="tab active">

<div class="card">

<input
id="searchInput"
placeholder="ค้นหาคำศัพท์..."
onkeyup="debounceSearch()"
>

<div id="searchResult"></div>

</div>

</div>

<!-- ALL WORDS -->

<div id="all"
class="tab">

<div class="card">

<div id="allWords"></div>

</div>

</div>

<!-- FLASHCARD -->

<div id="flash"
class="tab">

<div class="card">

<div
id="flashcard"
class="flashcard">
</div>

<div>

<button onclick="prevCard()">
◀ Prev
</button>

<button onclick="flipCard()">
🔄 Flip
</button>

<button onclick="editFlashcard()">
✏ Edit
</button>

<button onclick="nextCard()">
Next ▶
</button>

<button onclick="randomCard()">
🎲 Random
</button>

<button onclick="speak()">
🔊 Speak
</button>

</div>

</div>

</div>

<!-- QUIZ -->

<div id="quiz"
class="tab">

<div class="card">

<h2>
Quiz
</h2>

<p id="quizQuestion"></p>

<div id="quizOptions"></div>

<div id="quizResult"></div>

<button onclick="newQuiz()">
สุ่มใหม่
</button>

</div>

</div>

<!-- MANAGE -->

<div id="manage"
class="tab">

<div class="card">

<h2>
Manage Vocabulary
</h2>

<input
id="newWord"
placeholder="English Word"
>

<br><br>

<input
id="newMeaning"
placeholder="คำแปลไทย"
>

<br><br>

<input
id="newPronounce"
placeholder="คำอ่านไทย"
>

<br><br>

<input
id="newIPA"
placeholder="IPA"
>

<br><br>

<button onclick="addWord()">
➕ Add Word
</button>

<div id="manageList"></div>

</div>

</div>

</div>

<script>

let vocab=[];

let current=0;

let showMeaning=true;

let currentQuiz=null;

let currentPage=1;

const wordsPerPage=20;

let searchTimeout=null;

async function loadVocab(){

try{

const r=await fetch(
'vocab.json'
);

const text=
await r.text();

vocab=
JSON.parse(text);

renderWords();

showCard();

newQuiz();

}catch(e){

console.error(e);

alert(
'โหลด vocab.json ไม่สำเร็จ'
);

}

}

loadVocab();

function openTab(e,id){

document.querySelectorAll('.tab')
.forEach(t=>
t.classList.remove('active')
);

document.querySelectorAll('.tab-btn')
.forEach(b=>
b.classList.remove('active-btn')
);

document.getElementById(id)
.classList.add('active');

e.target.classList.add('active-btn');

if(id==='manage'){

renderManage();

}

}










/* SEARCH */

function debounceSearch(){

clearTimeout(searchTimeout);

searchTimeout=
setTimeout(()=>{

searchWord();

},150);

}

function searchWord(){

const q=
document
.getElementById('searchInput')
.value
.trim()
.toLowerCase();

if(!q){

document
.getElementById('searchResult')
.innerHTML='';

return;

}

const result=[];

const len=vocab.length;

for(let i=0;i<len;i++){

const v=vocab[i];

if(

(v.word||'')
.toLowerCase()
.includes(q)

||

(v.meaning_th||'')
.toLowerCase()
.includes(q)

){

result.push(v);

}

if(result.length>=30)
break;

}

let html='';

for(const v of result){

html+=`

<div class="word-item">

<b>
${v.word}
</b>

<br>

${v.meaning_th||'-'}

<br>

<small>
${v.pronounce_th||''}
</small>

</div>

`;

}

document
.getElementById('searchResult')
.innerHTML=html;

}










/* ALL WORDS */

function renderWords(){

const start=
(currentPage-1)
*wordsPerPage;

const end=
start+wordsPerPage;

const pageWords=
vocab.slice(start,end);

let html='';

for(const v of pageWords){

html+=`

<div class="word-item">

<b>
${v.word}
</b>

—

${v.meaning_th||'-'}

<br>

<small>
${v.pronounce_th||''}
</small>

</div>

`;

}

html+=renderPagination();

document
.getElementById('allWords')
.innerHTML=html;

}

function renderPagination(){

const totalPages=
Math.ceil(
vocab.length/wordsPerPage
);

let html=
'<div class="pagination">';

const start=
Math.max(
1,
currentPage-2
);

const end=
Math.min(
totalPages,
currentPage+2
);

if(currentPage>1){

html+=`

<button onclick="
goPage(${currentPage-1})
">
◀
</button>

`;

}

for(let i=start;i<=end;i++){

html+=`

<button onclick="
goPage(${i})
">

${i}

</button>

`;

}

if(currentPage<totalPages){

html+=`

<button onclick="
goPage(${currentPage+1})
">
▶
</button>

`;

}

html+='</div>';

return html;

}

function goPage(page){

currentPage=page;

renderWords();

window.scrollTo({
top:0,
behavior:'smooth'
});

}










/* FLASHCARD */

function showCard(){

if(!vocab.length)
return;

const v=vocab[current];

document
.getElementById('flashcard')
.innerHTML=`

<div class="big">

${v.word}

</div>

${
showMeaning

?

`

<div>
${v.meaning_th||'-'}
</div>

<div>
${v.pronounce_th||''}
</div>

<small>
${v.ipa||''}
</small>

`

:

`

<div style="
margin-top:20px;
font-size:22px;
opacity:.5;
">
🔄 Flip Card
</div>

`

}

`;

}

function nextCard(){

current++;

if(current>=vocab.length)
current=0;

showCard();

}

function prevCard(){

current--;

if(current<0)
current=vocab.length-1;

showCard();

}

function randomCard(){

current=
Math.floor(
Math.random()
*vocab.length
);

showCard();

}

function flipCard(){

showMeaning=!showMeaning;

showCard();

}

function speak(){

speechSynthesis.cancel();

const u=
new SpeechSynthesisUtterance(
vocab[current].word
);

u.lang='en-US';

u.rate=.9;

speechSynthesis.speak(u);

}

function editFlashcard(){

openTab(
{
target:
document.querySelectorAll('.tab-btn')[4]
},
'manage'
);

setTimeout(()=>{

const box=
document.getElementById(
`editBox-${current}`
);

if(box){

box.style.display='block';

box.scrollIntoView({
behavior:'smooth',
block:'center'
});

}

},200);

}










/* QUIZ */

function shuffle(a){

return a.sort(
()=>Math.random()-0.5
);

}

function newQuiz(){

const q=
vocab[
Math.floor(
Math.random()
*vocab.length
)
];

currentQuiz=q;

let options=[
q.meaning_th||'-'
];

while(options.length<4){

const c=
vocab[
Math.floor(
Math.random()
*vocab.length
)
].meaning_th||'-';

if(!options.includes(c))
options.push(c);

}

options=shuffle(options);

document
.getElementById('quizQuestion')
.innerHTML=

`คำว่า <b>
${q.word}
</b> แปลว่าอะไร?`;

document
.getElementById('quizOptions')
.innerHTML=

options.map(o=>`

<button onclick="
checkAnswer('${o}')
">

${o}

</button>

`).join('');

document
.getElementById('quizResult')
.innerHTML='';

}

function checkAnswer(ans){

const r=
document.getElementById(
'quizResult'
);

if(ans===currentQuiz.meaning_th){

r.innerHTML=
'✅ Correct';

r.style.color='green';

}else{

r.innerHTML=
'❌ Correct: '
+currentQuiz.meaning_th;

r.style.color='red';

}

}










/* MANAGE */

function addWord(){

const word=
document.getElementById(
'newWord'
).value.trim();

const meaning=
document.getElementById(
'newMeaning'
).value.trim();

const pronounce=
document.getElementById(
'newPronounce'
).value.trim();

const ipa=
document.getElementById(
'newIPA'
).value.trim();

if(!word||!meaning)
return;

vocab.unshift({

word,

meaning_th:meaning,

pronounce_th:pronounce,

ipa

});

renderWords();

renderManage();

showCard();

document.getElementById(
'newWord'
).value='';

document.getElementById(
'newMeaning'
).value='';

document.getElementById(
'newPronounce'
).value='';

document.getElementById(
'newIPA'
).value='';

}

function renderManage(){

let html='';

const limit=
vocab.slice(0,10);

for(let i=0;i<limit.length;i++){

const v=limit[i];

html+=`

<div class="word-item">

<b>
${v.word}
</b>

—

${v.meaning_th||'-'}

<br><br>

<button onclick="
toggleEdit(${i})
">
✏ Edit
</button>

<button onclick="
deleteWord(${i})
">
🗑 Delete
</button>

<div
id="editBox-${i}"
class="edit-box"
>

<input
id="edit-word-${i}"
value="${v.word}"
>

<br><br>

<input
id="edit-meaning-${i}"
value="${v.meaning_th||''}"
>

<br><br>

<button onclick="
saveEdit(${i})
">
💾 Save
</button>

</div>

</div>

`;

}

document
.getElementById('manageList')
.innerHTML=html;

}

function toggleEdit(i){

const box=
document.getElementById(
`editBox-${i}`
);

box.style.display=

box.style.display==='block'

?

'none'

:

'block';

}

function saveEdit(i){

vocab[i].word=

document.getElementById(
`edit-word-${i}`
).value;

vocab[i].meaning_th=

document.getElementById(
`edit-meaning-${i}`
).value;

renderWords();

renderManage();

showCard();

}

function deleteWord(i){

vocab.splice(i,1);

renderWords();

renderManage();

showCard();

}

</script>

</body>
</html>
