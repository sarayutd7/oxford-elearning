<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oxford 3000</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;

background:
linear-gradient(
135deg,
#dbeafe,
#eff6ff
);

color:#111827;
}

header{

padding:28px;

text-align:center;

backdrop-filter:blur(18px);

background:
rgba(255,255,255,.55);

position:sticky;

top:0;

z-index:999;

border-bottom:
1px solid rgba(255,255,255,.4);
}

h1{
margin:0;
font-size:38px;
}

.tabs{

display:flex;

gap:12px;

padding:18px;

overflow:auto;
}

.tab-btn{

border:none;

background:#000;

color:white;

padding:14px 20px;

border-radius:16px;

font-size:15px;

cursor:pointer;
}

.active-btn{
background:#111827;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.card{

background:
rgba(255,255,255,.55);

backdrop-filter:blur(20px);

border-radius:28px;

padding:24px;

margin-bottom:22px;

box-shadow:
0 10px 30px rgba(0,0,0,.08);
}

.tab{
display:none;
}

.active{
display:block;
}

input{

width:100%;

padding:18px;

border:none;

border-radius:18px;

font-size:16px;

background:white;
}

.word-item{

padding:16px;

margin-top:12px;

border-radius:18px;

background:
rgba(255,255,255,.7);
}

.flashcard{

min-height:260px;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

text-align:center;
}

.big{
font-size:52px;
font-weight:700;
}

.thai{
font-size:28px;
margin-top:10px;
}

small{
color:#555;
}

button{

border:none;

background:black;

color:white;

padding:14px 18px;

border-radius:16px;

cursor:pointer;

margin:6px;

font-size:15px;
}

.quiz-option{
display:block;
width:100%;
margin-top:10px;
}

.pagination{
margin-top:20px;
}

.pagination button{
margin-right:8px;
}

</style>
</head>

<body>

<header>
<h1>Oxford 3000</h1>
<p>Clean Blue Glass UI</p>
</header>

<div class="tabs">

<button
class="tab-btn active-btn"
onclick="openTab(event,'search')"
>
🔍 Search
</button>

<button
class="tab-btn"
onclick="openTab(event,'all')"
>
📚 All Words
</button>

<button
class="tab-btn"
onclick="openTab(event,'flash')"
>
🃏 Flashcard
</button>

<button
class="tab-btn"
onclick="openTab(event,'quiz')"
>
📝 Quiz
</button>

</div>

<div class="container">

<!-- SEARCH -->

<div id="search" class="tab active">

<div class="card">

<input
id="searchInput"
placeholder="ค้นหาคำศัพท์..."
onkeyup="searchWord()"
>

<div id="searchResult"></div>

</div>

</div>

<!-- ALL WORDS -->

<div id="all" class="tab">

<div class="card">

<div id="allWords"></div>

</div>

</div>

<!-- FLASHCARD -->

<div id="flash" class="tab">

<div class="card">

<div
id="flashcard"
class="flashcard"
>
Loading...
</div>

<div>

<button onclick="prevCard()">
◀ Prev
</button>

<button onclick="nextCard()">
Next ▶
</button>

<button onclick="speak()">
🔊 Speak
</button>

</div>

</div>

</div>

<!-- QUIZ -->

<div id="quiz" class="tab">

<div class="card">

<h2>Vocabulary Quiz</h2>

<p id="quizQuestion"></p>

<div id="quizOptions"></div>

<div id="quizResult"></div>

<button onclick="newQuiz()">
สุ่มใหม่
</button>

</div>

</div>

</div>

<script>

let vocab=[];

let current=0;

let currentQuiz=null;

let currentPage=1;

const wordsPerPage=10;

fetch('vocab.json')

.then(r=>r.json())

.then(data=>{

 vocab=data;

 showCard();

 renderWords();

 newQuiz();

});

function openTab(e,id){

 document.querySelectorAll('.tab')
 .forEach(t=>t.classList.remove('active'));

 document.querySelectorAll('.tab-btn')
 .forEach(b=>b.classList.remove('active-btn'));

 document.getElementById(id)
 .classList.add('active');

 e.target.classList.add('active-btn');
}

function showCard(){

 let v=vocab[current];

 document.getElementById('flashcard')
 .innerHTML=`

 <div class="big">
 ${v.word}
 </div>

 <div class="thai">
 ${v.meaning_th}
 </div>

 <div>
 ${v.pronounce_th}
 </div>

 <small>
 ${v.ipa}
 </small>

 `;
}

function nextCard(){

 current=(current+1)%vocab.length;

 showCard();
}

function prevCard(){

 current=
 (current-1+vocab.length)%vocab.length;

 showCard();
}

function speak(){

 speechSynthesis.cancel();

 const u=
 new SpeechSynthesisUtterance(
 vocab[current].word
 );

 u.lang='en-US';

 u.rate=.9;

 speechSynthesis.speak(u);
}

function searchWord(){

 let q=document
 .getElementById('searchInput')
 .value
 .toLowerCase();

 let found=vocab.filter(v=>

 v.word.toLowerCase().includes(q)

 ||

 v.meaning_th.includes(q)

 );

 document.getElementById(
 'searchResult'
 ).innerHTML=

 found.map(v=>`

 <div class="word-item">

 <b>${v.word}</b>

 <br>

 ${v.meaning_th}

 <br>

 ${v.pronounce_th}

 <br>

 <small>
 ${v.ipa}
 </small>

 </div>

 `).join('');
}

function renderWords(){

 const start =
 (currentPage-1)*wordsPerPage;

 const end =
 start + wordsPerPage;

 const pageWords =
 vocab.slice(start,end);

 document.getElementById(
 'allWords'
 ).innerHTML =

 pageWords.map(v=>`

 <div class="word-item">

 <b>${v.word}</b>

 —

 ${v.meaning_th}

 <br>

 <small>
 ${v.pronounce_th}
 </small>

 </div>

 `).join('')

 +

 renderPagination();
}

function renderPagination(){

 const totalPages =
 Math.ceil(
 vocab.length / wordsPerPage
 );

 let buttons='';

 for(let i=1;i<=totalPages;i++){

 buttons += `

 <button
 onclick="goPage(${i})"
 >

 ${i}

 </button>

 `;
 }

 return `

 <div class="pagination">

 ${buttons}

 </div>

 `;
}

function goPage(page){

 currentPage=page;

 renderWords();

 window.scrollTo({

 top:0,

 behavior:'smooth'

 });
}

function shuffle(a){

 return a.sort(
 ()=>Math.random()-0.5
 );
}

function newQuiz(){

 const q=vocab[
 Math.floor(
 Math.random()*vocab.length
 )
 ];

 currentQuiz=q;

 let options=[q.meaning_th];

 while(options.length<4){

 let c=vocab[
 Math.floor(
 Math.random()*vocab.length
 )
 ].meaning_th;

 if(!options.includes(c))
 options.push(c);
 }

 options=shuffle(options);

 document.getElementById(
 'quizQuestion'
 ).innerHTML=

 `คำว่า
 <b>${q.word}</b>
 แปลว่าอะไร?`;

 document.getElementById(
 'quizOptions'
 ).innerHTML=

 options.map(o=>`

 <button
 class="quiz-option"
 onclick="checkAnswer('${o}')"
 >

 ${o}

 </button>

 `).join('');

 document.getElementById(
 'quizResult'
 ).innerHTML='';
}

function checkAnswer(ans){

 let r=document
 .getElementById('quizResult');

 if(ans===currentQuiz.meaning_th){

 r.innerHTML='✅ Correct';

 r.style.color='green';

 }else{

 r.innerHTML=
 '❌ Correct: '
 +currentQuiz.meaning_th;

 r.style.color='red';
 }
}

</script>

</body>
</html>
