<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Oxford 3000 E-Learning</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;

  background:
  linear-gradient(
    135deg,
    #f7f3ef,
    #efe8df
  );

  color:#2b2b2b;
}

header{

  position:sticky;
  top:0;

  backdrop-filter:blur(14px);

  background:rgba(255,255,255,.45);

  border-bottom:
  1px solid rgba(255,255,255,.4);

  padding:18px;

  text-align:center;

  z-index:999;
}

header h1{
  margin:0;
  font-size:34px;
}

header p{
  opacity:.7;
}

.tabs{

  display:flex;

  gap:10px;

  padding:18px;

  overflow:auto;

  position:sticky;

  top:92px;

  z-index:998;

  backdrop-filter:blur(18px);

  background:rgba(255,255,255,.35);

}

.tab-btn{

  border:none;

  border-radius:999px;

  padding:12px 18px;

  cursor:pointer;

  font-size:15px;

  background:rgba(255,255,255,.5);

  backdrop-filter:blur(10px);

  transition:.2s;
}

.tab-btn.active{

  background:#d99a6c;

  color:white;
}

.container{
  padding:20px;
  max-width:1100px;
  margin:auto;
}

.tab-content{
  display:none;
}

.tab-content.active{
  display:block;
}

.card{

  background:
  rgba(255,255,255,.45);

  backdrop-filter:blur(20px);

  border:
  1px solid rgba(255,255,255,.35);

  border-radius:28px;

  padding:24px;

  margin-bottom:22px;

  box-shadow:
  0 8px 30px rgba(0,0,0,.06);
}

input{

  width:100%;

  padding:16px;

  border:none;

  border-radius:18px;

  font-size:16px;

  background:rgba(255,255,255,.7);

  outline:none;
}

.flashcard{

  min-height:260px;

  display:flex;

  flex-direction:column;

  justify-content:center;

  align-items:center;

  text-align:center;

  border-radius:24px;

  background:
  rgba(255,255,255,.5);

  cursor:pointer;

  padding:30px;
}

.word{
  font-size:52px;
  font-weight:700;
}

.thai{
  margin-top:10px;
  font-size:28px;
  color:#666;
}

.pronounce{
  margin-top:8px;
  font-size:20px;
  color:#777;
}

.ipa{
  margin-top:6px;
  color:#999;
}

.controls{
  margin-top:20px;
  display:flex;
  gap:12px;
  flex-wrap:wrap;
}

button{

  border:none;

  padding:14px 20px;

  border-radius:16px;

  cursor:pointer;

  font-size:16px;

  background:#d99a6c;

  color:black;

  transition:.2s;
}

button:hover{
  transform:scale(1.03);
}

.list-item{

  padding:14px;

  border-radius:18px;

  margin-bottom:12px;

  background:rgba(255,255,255,.55);
}

.quiz-option{
  display:block;
  width:100%;
  margin-top:12px;
}

.result{
  margin-top:18px;
  font-weight:700;
}

small{
  color:#777;
}

</style>
</head>

<body>

<header>
<h1>Oxford 3000</h1>
<p>Clear • Clean • Blur UI</p>
</header>

<div class="tabs">

<button class="tab-btn active"
onclick="openTab('search')">
🔍 Search
</button>

<button class="tab-btn"
onclick="openTab('allwords')">
📚 All Words
</button>

<button class="tab-btn"
onclick="openTab('flashcard')">
🃏 Flashcard
</button>

<button class="tab-btn"
onclick="openTab('quiz')">
📝 Quiz
</button>

</div>

<div class="container">

<!-- SEARCH -->

<div id="search" class="tab-content active">

<div class="card">

<h2>ค้นหาคำศัพท์</h2>

<input
type="text"
id="searchInput"
placeholder="Search vocabulary..."
onkeyup="searchWord()"
/>

<div id="searchResult"></div>

</div>

</div>

<!-- ALL WORDS -->

<div id="allwords" class="tab-content">

<div class="card">

<h2>Oxford Vocabulary</h2>

<div id="allWordsList"></div>

</div>

</div>

<!-- FLASHCARD -->

<div id="flashcard" class="tab-content">

<div class="card">

<h2>Flashcard</h2>

<div
class="flashcard"
id="flashcardBox"
onclick="flipCard()"
>
Loading...
</div>

<div class="controls">

<button onclick="prevCard()">
◀ Prev
</button>

<button onclick="nextCard()">
Next ▶
</button>

<button onclick="speakCurrent()">
🔊 Speak
</button>

</div>

</div>

</div>

<!-- QUIZ -->

<div id="quiz" class="tab-content">

<div class="card">

<h2>Quiz</h2>

<p id="quizQuestion"></p>

<div id="quizOptions"></div>

<div id="quizResult" class="result"></div>

<button onclick="newQuiz()">
สุ่มคำถามใหม่
</button>

</div>

</div>

</div>

<script>

let vocab=[];

let current=0;

let flipped=false;

let currentQuiz=null;

fetch('vocab.json')
.then(r=>r.json())
.then(data=>{

 vocab=data;

 showCard();

 renderAllWords();

 newQuiz();

});

function openTab(id){

 document
 .querySelectorAll('.tab-content')
 .forEach(t=>t.classList.remove('active'));

 document
 .querySelectorAll('.tab-btn')
 .forEach(b=>b.classList.remove('active'));

 document
 .getElementById(id)
 .classList.add('active');

 event.target.classList.add('active');
}

function showCard(){

 const item=vocab[current];

 document
 .getElementById('flashcardBox')
 .innerHTML=`

   <div class="word">
     ${item.word}
   </div>

   <div class="thai">
     ${item.meaning_th}
   </div>

   <div class="pronounce">
     ${item.pronounce_th}
   </div>

   <div class="ipa">
     ${item.ipa}
   </div>

 `;

 flipped=false;
}

function flipCard(){

 const item=vocab[current];

 if(!flipped){

   document
   .getElementById('flashcardBox')
   .innerHTML=`

     <div class="thai">
       ${item.meaning_th}
     </div>

     <br>

     <small>
       ${item.part_of_speech}
     </small>

     <br><br>

     <div class="word">
       ${item.word}
     </div>

   `;

   flipped=true;

 }else{

   showCard();

 }
}

function nextCard(){

 current=(current+1)%vocab.length;

 showCard();
}

function prevCard(){

 current=(current-1+vocab.length)%vocab.length;

 showCard();
}

function speakCurrent(){

 speechSynthesis.cancel();

 const u=
 new SpeechSynthesisUtterance(
   vocab[current].word
 );

 u.lang='en-US';

 u.rate=.9;

 speechSynthesis.speak(u);
}

function searchWord(){

 const q=document
 .getElementById('searchInput')
 .value
 .toLowerCase();

 const found=vocab.filter(v=>

   v.word.toLowerCase().includes(q)

   ||

   (v.meaning_th||'')
   .includes(q)

 ).slice(0,50);

 document
 .getElementById('searchResult')
 .innerHTML=

 found.map(v=>`

 <div class="list-item">

   <b>${v.word}</b>

   <br>

   ${v.meaning_th}

   <br>

   <small>
   ${v.pronounce_th}
   </small>

   <br>

   <small>
   ${v.ipa}
   </small>

 </div>

 `).join('');
}

function renderAllWords(){

 document
 .getElementById('allWordsList')
 .innerHTML=

 vocab.map(v=>`

 <div class="list-item">

   <b>${v.word}</b>

   —
   ${v.meaning_th}

   <br>

   <small>
   ${v.pronounce_th}
   </small>

 </div>

 `).join('');
}

function shuffle(arr){
 return arr.sort(()=>Math.random()-0.5);
}

function newQuiz(){

 const q=vocab[
   Math.floor(Math.random()*vocab.length)
 ];

 currentQuiz=q;

 let options=[q.meaning_th];

 while(options.length<4){

   const c=vocab[
     Math.floor(Math.random()*vocab.length)
   ].meaning_th;

   if(!options.includes(c))
      options.push(c);
 }

 options=shuffle(options);

 document
 .getElementById('quizQuestion')
 .innerHTML=

 `คำว่า
 <strong>${q.word}</strong>
 แปลว่าอะไร?`;

 document
 .getElementById('quizOptions')
 .innerHTML=

 options.map(o=>`

 <button
 class="quiz-option"
 onclick="checkAnswer('${o}')"
 >
   ${o}
 </button>

 `).join('');

 document
 .getElementById('quizResult')
 .innerHTML='';
}

function checkAnswer(ans){

 const r=document
 .getElementById('quizResult');

 if(ans===currentQuiz.meaning_th){

   r.innerHTML='✅ Correct';

   r.style.color='green';

 }else{

   r.innerHTML=
   `❌ Correct:
   ${currentQuiz.meaning_th}`;

   r.style.color='red';
 }
}

</script>

</body>
</html>
```
